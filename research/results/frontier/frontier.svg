<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
<title id="title">Economic Assurance Frontier</title>
<desc id="desc">Acceptable outcome rate versus mean full effective cost for tested agent configurations.</desc>
<rect width="100%" height="100%" fill="#0d1117" rx="14"/>
<text x="24" y="30" fill="#f0f6fc" font-family="ui-monospace,monospace" font-size="18" font-weight="700">Economic Assurance Frontier</text>
<line x1="84" y1="360" x2="724" y2="360" stroke="#8b949e"/>
<line x1="84" y1="46" x2="84" y2="360" stroke="#8b949e"/>
<text x="404.0" y="408" text-anchor="middle" fill="#c9d1d9" font-family="ui-sans-serif,sans-serif" font-size="13">Mean full effective cost per attempt (USD)</text>
<text x="20" y="203.0" transform="rotate(-90 20 203.0)" text-anchor="middle" fill="#c9d1d9" font-family="ui-sans-serif,sans-serif" font-size="13">Acceptable outcome rate</text>
<line x1="84.0" y1="46" x2="84.0" y2="360" stroke="#21262d"/>
<text x="84.0" y="382" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,monospace" font-size="11">$0.93</text>
