name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: make demo
      - run: make modularity
      - run: make lessons
      - run: make benchmark
      - run: make frontier

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip wheel . --no-deps --wheel-dir /tmp/wheels
      - run: python -m venv /tmp/agent-economics-venv
      - run: /tmp/agent-economics-venv/bin/pip install /tmp/wheels/agent_economics_lab-*.whl
      - run: /tmp/agent-economics-venv/bin/agent-economics capabilities
        working-directory: /tmp
